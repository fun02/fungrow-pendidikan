<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunGrow Pendidikan - Platform Pembelajaran</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; overscroll-behavior-y: none; background: #0f172a; color: #e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0f172a; --surface: rgba(30,41,59,0.7); --card: rgba(51,65,85,0.4);
            --text: #e2e8f0; --text2: #94a3b8; --accent: #6366f1; --accent2: #a78bfa;
            --glow: rgba(99,102,241,0.3); --border: rgba(148,163,184,0.15);
        }
        .light {
            --bg: #f0f4ff; --surface: rgba(255,255,255,0.75); --card: rgba(255,255,255,0.6);
            --text: #1e293b; --text2: #475569; --accent: #4f46e5; --accent2: #7c3aed;
            --glow: rgba(79,70,229,0.15); --border: rgba(148,163,184,0.25);
        }
        .glass { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; }
        .bubble-left { border-radius: 4px 16px 16px 16px; }
        .bubble-right { border-radius: 16px 4px 16px 16px; }
        .animate-fade { animation: fadeIn 0.3s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .highlight-msg { animation: highlight 1.5s ease; }
        @keyframes highlight { 0% { background: rgba(99,102,241,0.5); } 100% { background: transparent; } }
    </style>
</head>
<body class="h-full overflow-hidden flex flex-col">

<div id="app" class="h-full flex flex-col overflow-hidden">
    <div class="h-full flex flex-col items-center justify-center space-y-4">
        <div class="text-4xl animate-bounce">🎓</div>
        <div class="text-xl font-bold">Menyiapkan FunGrow...</div>
        <div class="w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-500 animate-[pulse_1.5s_infinite]"></div>
        </div>
    </div>
</div>

<div id="global-modal" class="hidden fixed inset-0 z-[1000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="w-full max-w-sm" id="modal-content"></div>
</div>

<script>
    // ========== 1. CONFIG & STATE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAdkHAiA_wdYkIJNL-bIhACX8du6V6f3Xk",
        authDomain: "funnn-4161a.firebaseapp.com",
        projectId: "funnn-4161a",
        storageBucket: "funnn-4161a.firebasestorage.app",
        messagingSenderId: "211376689494",
        appId: "1:211376689494:web:99359a0f45810fae7b06f7"
    };

    const COURSES = [
        { id: 'mo', name: 'Manajemen Operasional', icon: '⚙️' },
        { id: 'pk', name: 'Perilaku Konsumen', icon: '🧠' },
        { id: 'ms', name: 'Manajemen Strategi', icon: '🎯' },
        { id: 'sim', name: 'Sistem Informasi Manajemen', icon: '💻' },
        { id: 'fmk', name: 'Fiqh Muamalah Kontemporer', icon: '📖' },
        { id: 'mks', name: 'Manajemen Keuangan Syariah', icon: '💰' },
        { id: 'aks', name: 'Akuntansi Keuangan Syariah', icon: '📊' },
        { id: 'emm', name: 'Ekonomi Makro dan Mikro', icon: '📈' }
    ];

    const STATE = {
        currentUser: null, isDark: true, currentCourse: null,
        screen: 'loading', chats: {}, unsubscribers: {},
        replyingTo: null
    };

    // ========== 2. ANTI-BLANK INITIALIZATION (FIX #1 & #2) ==========
    let auth, db, storage;

    function initializeAppCore() {
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();
            storage = firebase.storage();

            // Safe Persistence (FIX #1)
            try {
                db.enablePersistence({ synchronizeTabs: true });
            } catch (err) {
                console.warn("Persistence OFF:", err.message);
            }

            console.log("Firebase initialized successfully");
        } catch (e) {
            console.error("CRITICAL INIT ERROR:", e);
            document.body.innerHTML = `
                <div class="h-full flex items-center justify-center bg-slate-900 p-10 text-center">
                    <div class="glass p-8 border-red-500/50">
                        <div class="text-4xl mb-4">⚠️</div>
                        <h1 class="text-xl font-bold text-white mb-2">Gagal Menghubungkan</h1>
                        <p class="text-slate-400 text-sm mb-6">${e.message}</p>
                        <button onclick="location.reload()" class="bg-indigo-600 px-6 py-2 rounded-xl text-white font-bold">Coba Lagi</button>
                    </div>
                </div>
            `;
            throw e;
        }
    }

    // ========== 3. UTILS ==========
    function formatTime(ts) {
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(ts) {
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });
    }

    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `animate-fade fixed top-4 right-4 z-[2000] px-5 py-3 rounded-xl text-sm font-medium shadow-lg text-white ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
    }

    // ========== 4. AUTH & CORE LOGIC ==========
    try {
        initializeAppCore();

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    STATE.currentUser = { uid: user.uid, email: user.email, displayName: user.displayName || doc.data()?.displayName || 'User' };
                    STATE.screen = 'dashboard';
                } catch (e) {
                    STATE.screen = 'login';
                }
            } else {
                STATE.screen = 'login';
            }
            renderFull();
        });
    } catch (e) { /* handled in init */ }

    // FORCE LOAD LOGIN IF HANGS (FIX #3)
    setTimeout(() => {
        if (STATE.screen === 'loading') {
            console.warn("FORCE LOAD TRIGGERED");
            STATE.screen = 'login';
            renderFull();
        }
    }, 4000);

    // ========== 5. RENDER SYSTEM ==========
    function renderFull() {
        const el = document.getElementById('app');
        if (STATE.screen === 'login') return renderLogin(el);
        if (STATE.screen === 'dashboard') return renderDashboard(el);
        if (STATE.screen === 'course') return renderCourse(el);
        lucide.createIcons();
    }

    function renderLogin(el) {
        el.innerHTML = `
            <div class="h-full flex items-center justify-center p-6 animate-fade">
                <div class="glass p-8 w-full max-w-sm text-center">
                    <div class="text-5xl mb-4">🎓</div>
                    <h1 class="text-2xl font-bold mb-6">FunGrow Pendidikan</h1>
                    <div class="space-y-4">
                        <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 outline-none">
                        <input id="pass" type="password" placeholder="Password" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 outline-none">
                        <button onclick="handleLogin()" class="w-full py-3 bg-indigo-600 rounded-xl font-bold">Masuk</button>
                    </div>
                </div>
            </div>
        `;
    }

    async function handleLogin() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { showToast(err.message, 'error'); }
    }

    function renderDashboard(el) {
        el.innerHTML = `
            <div class="flex-1 flex flex-col overflow-auto p-4 space-y-4">
                <div class="flex justify-between items-center p-2">
                    <h1 class="text-xl font-bold">FunGrow</h1>
                    <button onclick="auth.signOut()" class="text-red-400 p-2"><i data-lucide="log-out"></i></button>
                </div>
                <div class="p-6 rounded-3xl bg-indigo-600">
                    <h2 class="text-lg font-bold">Halo, ${STATE.currentUser.displayName}!</h2>
                    <p class="text-indigo-100 text-sm">Pilih kelasmu hari ini.</p>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    ${COURSES.map(c => `
                        <div onclick="openCourse('${c.id}')" class="glass p-4 flex items-center gap-4 active:scale-95 transition-transform cursor-pointer">
                            <div class="text-2xl">${c.icon}</div>
                            <div class="font-bold text-sm">${c.name}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    // ========== 6. CHAT & REPLY SYSTEM ==========
    function openCourse(id) {
        STATE.currentCourse = COURSES.find(c => c.id === id);
        STATE.screen = 'course';
        renderFull();
        setupChatListener(id);
    }

    function setupChatListener(courseId) {
        if (STATE.unsubscribers.chat) STATE.unsubscribers.chat();
        STATE.unsubscribers.chat = db.collection('courses').doc(courseId).collection('chats')
            .orderBy('timestamp', 'asc').limit(100).onSnapshot(snap => {
                STATE.chats[courseId] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderMessages();
            });
    }

    function renderMessages() {
        const container = document.getElementById('chat-container');
        if (!container) return;

        let html = '';
        let lastDate = '';
        const msgs = STATE.chats[STATE.currentCourse.id] || [];

        msgs.forEach(m => {
            const dateStr = formatDate(m.timestamp);
            if (dateStr !== lastDate && dateStr !== '') {
                html += `<div class="text-center text-[10px] text-slate-500 my-4 uppercase tracking-widest font-bold">${dateStr}</div>`;
                lastDate = dateStr;
            }

            const isMine = m.userId === STATE.currentUser.uid;
            
            // Reply UI inside bubble
            let replyInfo = '';
            if (m.replyTo) {
                replyInfo = `
                    <div onclick="scrollToMsg('${m.replyTo.id}')" class="bg-black/20 p-2 rounded mb-1 text-[10px] border-l-2 border-indigo-400 cursor-pointer opacity-80">
                        <b class="text-indigo-300">@${m.replyTo.userName}</b><br>
                        <span class="truncate block">${m.replyTo.text}</span>
                    </div>
                `;
            }

            let content = m.text || '';
            if (m.fileUrl) {
                content = `<a href="${m.fileUrl}" target="_blank" class="flex items-center gap-2 text-indigo-300 underline"><i data-lucide="file-text" class="w-4 h-4"></i> ${m.fileName}</a>`;
            }

            html += `
                <div id="msg-${m.id}" class="flex ${isMine ? 'justify-end' : 'justify-start'} mb-3 animate-fade">
                    <div class="${isMine ? 'bg-indigo-600 bubble-right' : 'bg-slate-800 bubble-left'} p-3 max-w-[85%] shadow-lg">
                        ${!isMine ? `<div class="text-[10px] font-bold text-indigo-300 mb-1">${m.userName}</div>` : ''}
                        ${replyInfo}
                        <div class="text-sm break-words">${content}</div>
                        <div class="flex justify-between items-center mt-1 gap-4">
                            <button onclick="setReply('${m.id}', '${(m.text || m.fileName || 'File').replace(/'/g, "\\'")}', '${m.userName}')" class="text-[10px] opacity-50 hover:opacity-100 flex items-center gap-1">↩ Reply</button>
                            <span class="text-[9px] opacity-40">${formatTime(m.timestamp)}</span>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html || '<div class="text-center text-slate-500 mt-20 text-sm">Belum ada pesan</div>';
        container.scrollTop = container.scrollHeight;
        lucide.createIcons();
    }

    // REPLY LOGIC
    function setReply(id, text, user) {
        STATE.replyingTo = { id, text, userName: user };
        const bar = document.getElementById('reply-bar');
        bar.innerHTML = `
            <div class="flex justify-between items-center bg-slate-800 p-2 rounded-t-xl border-l-4 border-indigo-500 animate-fade">
                <div class="text-xs truncate mr-4"><b>Balas ${user}:</b> ${text}</div>
                <button onclick="cancelReply()"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
        `;
        bar.classList.remove('hidden');
        document.getElementById('chat-input').focus();
        lucide.createIcons();
    }

    function cancelReply() {
        STATE.replyingTo = null;
        document.getElementById('reply-bar').classList.add('hidden');
    }

    function scrollToMsg(id) {
        const el = document.getElementById('msg-' + id);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight-msg');
            setTimeout(() => el.classList.remove('highlight-msg'), 1500);
        }
    }

    // ========== 7. UPLOAD & SEND ==========
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        const msgData = {
            text,
            userId: STATE.currentUser.uid,
            userName: STATE.currentUser.displayName,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            replyTo: STATE.replyingTo || null
        };

        input.value = '';
        cancelReply();
        try {
            await db.collection('courses').doc(STATE.currentCourse.id).collection('chats').add(msgData);
        } catch(e) { showToast("Gagal kirim", "error"); }
    }

    async function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        showToast("Mengunggah...", "info");
        try {
            const ref = storage.ref(`chats/${STATE.currentCourse.id}/${Date.now()}_${file.name}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            await db.collection('courses').doc(STATE.currentCourse.id).collection('chats').add({
                fileUrl: url,
                fileName: file.name,
                userId: STATE.currentUser.uid,
                userName: STATE.currentUser.displayName,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                replyTo: STATE.replyingTo || null
            });
            cancelReply();
        } catch(e) { showToast("Gagal unggah", "error"); }
    }

    function renderCourse(el) {
        el.innerHTML = `
            <div class="h-full flex flex-col overflow-hidden">
                <div class="glass flex items-center p-4 m-2 rounded-2xl">
                    <button onclick="STATE.screen='dashboard'; renderFull()" class="mr-4"><i data-lucide="arrow-left"></i></button>
                    <div class="font-bold">${STATE.currentCourse.icon} ${STATE.currentCourse.name}</div>
                </div>
                
                <div id="chat-container" class="flex-1 overflow-y-auto p-4"></div>

                <div class="p-2 space-y-2">
                    <div id="reply-bar" class="hidden mx-2"></div>
                    <div class="glass flex items-end p-2 gap-2 rounded-2xl">
                        <button onclick="document.getElementById('file-in').click()" class="p-3 text-slate-400"><i data-lucide="paperclip"></i></button>
                        <input type="file" id="file-in" class="hidden" onchange="handleFileUpload(event)">
                        
                        <textarea id="chat-input" rows="1" class="flex-1 bg-transparent p-3 outline-none text-sm resize-none" placeholder="Ketik pesan..."></textarea>
                        
                        <button onclick="sendMessage()" class="p-3 bg-indigo-600 rounded-xl text-white"><i data-lucide="send"></i></button>
                    </div>
                </div>
            </div>
        `;
        lucide.createIcons();
        renderMessages();
    }
</script>

</body>
</html>
